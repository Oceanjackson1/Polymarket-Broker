services:
  # --- Infrastructure ---
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: broker
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-broker_secure_pwd}
      POSTGRES_DB: broker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No host port binding — only accessible within Docker network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U broker"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    # No host port binding — only accessible within Docker network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- API Server ---
  api:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://broker:${POSTGRES_PASSWORD:-broker_secure_pwd}@postgres:5432/broker
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
